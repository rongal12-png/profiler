version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: wallet-intel-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    # ports: NOT exposed publicly — internal only
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: wallet-intel-redis
    # ports: NOT exposed publicly — internal only
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: wallet-intel-api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB}
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - ETHEREUM_RPC_URL=${ETHEREUM_RPC_URL}
      - BASE_RPC_URL=${BASE_RPC_URL}
      - ARBITRUM_RPC_URL=${ARBITRUM_RPC_URL}
      - OPTIMISM_RPC_URL=${OPTIMISM_RPC_URL}
      - POLYGON_RPC_URL=${POLYGON_RPC_URL}
      - AVALANCHE_RPC_URL=${AVALANCHE_RPC_URL}
      - FANTOM_RPC_URL=${FANTOM_RPC_URL}
      - BSC_RPC_URL=${BSC_RPC_URL}
      - SOLANA_RPC_URL=${SOLANA_RPC_URL}
      - COINGECKO_API_KEY=${COINGECKO_API_KEY}
      - ADMIN_API_KEY=${ADMIN_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: .
    # No container_name — allows horizontal scaling: docker-compose up --scale worker=3
    # H7: Gevent pool — 200 concurrent greenlets per container, all I/O non-blocking.
    command: celery -A app.worker.celery_app worker --loglevel=info -P gevent -c 200
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB}
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - ETHEREUM_RPC_URL=${ETHEREUM_RPC_URL}
      - BASE_RPC_URL=${BASE_RPC_URL}
      - ARBITRUM_RPC_URL=${ARBITRUM_RPC_URL}
      - OPTIMISM_RPC_URL=${OPTIMISM_RPC_URL}
      - POLYGON_RPC_URL=${POLYGON_RPC_URL}
      - AVALANCHE_RPC_URL=${AVALANCHE_RPC_URL}
      - FANTOM_RPC_URL=${FANTOM_RPC_URL}
      - BSC_RPC_URL=${BSC_RPC_URL}
      - SOLANA_RPC_URL=${SOLANA_RPC_URL}
      - COINGECKO_API_KEY=${COINGECKO_API_KEY}
      - ADMIN_API_KEY=${ADMIN_API_KEY}
    depends_on:
      - api
    # L1: Healthcheck for worker
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.worker.celery_app inspect ping --timeout 10 2>/dev/null | grep -q 'ok' || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 30s
    # L10: Memory/CPU limits for worker (gevent is lightweight — 200 greenlets fit in 3G)
    deploy:
      resources:
        limits:
          memory: 3G
          cpus: '4.0'

  beat:
    build: .
    container_name: wallet-intel-beat
    # M6: Store beat schedule in a named volume (not local file / not committed to git)
    command: celery -A app.worker.celery_app beat --loglevel=info --schedule=/data/celerybeat-schedule
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB}
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - ADMIN_API_KEY=${ADMIN_API_KEY}
    depends_on:
      - redis
      - api
    tmpfs:
      - /data
    # L1: Healthcheck for beat
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/celerybeat-alive || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  frontend:
    build: ./frontend
    container_name: wallet-intel-frontend
    ports:
      - "3000:3000"
    environment:
      - API_BASE_URL=http://api:8000
      - SITE_PASSWORD=${SITE_PASSWORD:-wallet123}
      - NODE_ENV=development
    depends_on:
      - api

volumes:
  postgres_data:
