services:
  # PostgreSQL Database
  - type: pserv
    name: wallet-intel-db
    env: docker
    plan: free
    region: frankfurt
    image:
      url: postgres:16-alpine
    envVars:
      - key: POSTGRES_USER
        value: wallet_user
      - key: POSTGRES_PASSWORD
        generateValue: true
      - key: POSTGRES_DB
        value: wallet_intel
    disk:
      name: postgres-data
      mountPath: /var/lib/postgresql/data
      sizeGB: 1

  # Redis Cache
  - type: pserv
    name: wallet-intel-redis
    env: docker
    plan: free
    region: frankfurt
    image:
      url: redis:7-alpine

  # Backend API
  - type: web
    name: wallet-intel-api
    env: docker
    region: frankfurt
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    dockerCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PORT
        value: 8000
      - key: DATABASE_URL
        fromDatabase:
          name: wallet-intel-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: wallet-intel-redis
          type: pserv
          property: connectionString
      - key: ETHEREUM_RPC_URL
        sync: false
      - key: BASE_RPC_URL
        sync: false
      - key: ADMIN_API_KEY
        generateValue: true
      - key: SITE_PASSWORD
        sync: false

  # Celery Worker
  - type: worker
    name: wallet-intel-worker
    env: docker
    region: frankfurt
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    dockerCommand: celery -A worker worker --loglevel=info
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: wallet-intel-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: wallet-intel-redis
          type: pserv
          property: connectionString
      - key: ETHEREUM_RPC_URL
        sync: false
      - key: BASE_RPC_URL
        sync: false

  # Frontend
  - type: web
    name: wallet-intel-frontend
    env: node
    region: frankfurt
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    startCommand: cd frontend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        fromService:
          name: wallet-intel-api
          type: web
          property: host
      - key: SITE_PASSWORD
        sync: false

databases:
  - name: wallet-intel-db
    databaseName: wallet_intel
    user: wallet_user
    plan: free
